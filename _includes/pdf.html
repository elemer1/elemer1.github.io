{% assign pdf_title = include.title | default: 'PDF preview' %}
{% assign pdf_height = include.height | default: '780' %}
<div class="pdf-embed" style="height:{{ pdf_height }}px">
  <iframe
    src="/assets/pdfjs/web/viewer.html?v=2&file={{ include.src | url_encode }}"
    title="{{ pdf_title | escape }}"
    loading="lazy"
    allowfullscreen></iframe>
</div>
