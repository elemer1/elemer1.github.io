{% assign video_title = include.title | default: 'YouTube video player' %}
{% assign is_short = include.short %}
<div class="video-embed{% if is_short %} is-short{% endif %}">
  <iframe
    src="https://www.youtube.com/embed/{{ include.id }}"
    title="{{ video_title | escape }}"
    loading="lazy"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    allowfullscreen>
  </iframe>
</div>
