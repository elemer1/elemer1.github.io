# Site settings
title: Elemer
description: Elemer's personal website.
baseurl: ""
url: "https://elemer.net"

# Build settings
markdown: kramdown
permalink: /:title/
future: true

# Kramdown settings for math
kramdown:
  math_engine: mathjax
  syntax_highlighter_opts:
    disable: true

# Performance optimizations
sass:
  style: compressed

# Collections
collections:
  markdown:
    output: true
    permalink: /:title/
  html:
    output: true

defaults:
  - scope:
      path: ""
      type: "markdown"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "html"
    values:
      render_with_liquid: false

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - package.json
  - package-lock.json
  - node_modules
  - scripts
  - publish.sh
