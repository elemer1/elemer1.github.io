<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - {{ site.title }}</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="googlebot" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <style>
    html,body{margin:0;padding:0;height:100%;background:#525659}
    object,embed,iframe{border:0;width:100%;height:100%;display:block}
    .fallback{color:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:40px;max-width:650px;margin:0 auto}
    .fallback a{color:#fff}
  </style>
</head>
<body>
  <object data="{{ page.pdf }}" type="application/pdf">
    <div class="fallback">
      <p>Your browser can't display PDFs inline.</p>
      <p><a href="{{ page.pdf }}">Download {{ page.title }}</a></p>
    </div>
  </object>
</body>
</html>
