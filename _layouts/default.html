<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>

  <!-- SEO Meta Tags -->
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="author" content="{{ site.title }}">

  <!-- Theme Color -->
  <meta name="theme-color" content="#ffffff">

  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">

  <!-- Inlined CSS -->
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;font-size:16px;line-height:1.6;color:#333;background:#fff;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
    .container{max-width:650px;margin:0 auto;padding:60px 20px}
    header{margin-bottom:60px}
    header h1{font-size:20px;font-weight:600}
    header h1 a{color:#333;text-decoration:none}
    header h1 a:hover{text-decoration:underline}
    .post-title{font-size:28px;font-weight:700;margin:0 0 30px 0;line-height:1.3}
    main h2{font-size:18px;font-weight:600;margin:40px 0 20px 0}
    main h3{font-size:16px;font-weight:600;margin:30px 0 15px 0}
    main p{margin:15px 0}
    main ul,main ol{margin:15px 0;padding-left:30px}
    main li{margin:5px 0}
    main a{color:#0066cc;text-decoration:none}
    main a:hover{text-decoration:underline}
    .post-list{list-style:none;padding:0}
    .post-list li{margin:20px 0}
    .post-list a,.post-list a:link,.post-list a:visited{color:#333;text-decoration:none}
    .post-list a:hover{color:#0066cc}
  </style>

  {% if page.math %}
  <!-- MathJax: only loaded on pages with math: true -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true,
        processEnvironments: true,
        tags: 'ams'
      },
      svg: {
        fontCache: 'global'
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  {% endif %}
</head>
<body>
  <div class="container">
    <header>
      <h1><a href="/">{{ site.title }}</a></h1>
    </header>
    <main>
      {{ content }}
    </main>
  </div>
</body>
</html>
