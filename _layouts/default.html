<!DOCTYPE html>
<html lang="{% if page.lang %}{{ page.lang }}{% else %}zh-CN{% endif %}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>

  <!-- Block search engine indexing -->
  <meta name="robots" content="noindex, nofollow">
  <meta name="googlebot" content="noindex, nofollow">

  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="author" content="{{ site.title }}">

  <!-- Theme Color -->
  <meta name="theme-color" content="#ffffff">

  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">

  <!-- Preconnect to MathJax CDN -->
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>

  <!-- Inlined CSS -->
  <style>
    *{margin:0;padding:0;box-sizing:border-box;color:#000}
    html,body{max-width:100%;overflow-x:hidden}
    html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
    body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Helvetica,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",微软雅黑,Arial,sans-serif;font-size:16px;line-height:1.6;background:#fff;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
    .container{max-width:650px;margin:0 auto;padding:60px 20px}
    header{margin-bottom:60px}
    header h1{font-size:20px;font-weight:600}
    header h1 a{text-decoration:none}
    header h1 a:hover{text-decoration:underline}
    .post-title{font-size:32px;font-weight:700;margin:0 0 30px 0;line-height:1.25}
    main{min-width:0;overflow-wrap:break-word;word-wrap:break-word}
    main h1{font-size:28px;font-weight:700;margin:50px 0 25px 0;line-height:1.25}
    main h2{font-size:22px;font-weight:700;margin:40px 0 20px 0;line-height:1.3}
    main h3{font-size:19px;font-weight:600;margin:30px 0 15px 0;line-height:1.35}
    main h4{font-size:17px;font-weight:600;margin:25px 0 12px 0;line-height:1.4}
    main h5{font-size:15px;font-weight:600;margin:20px 0 10px 0;line-height:1.4}
    main h6{font-size:14px;font-weight:600;margin:20px 0 10px 0;line-height:1.4;color:#57606a}
    main p{margin:15px 0}
    main ul,main ol{margin:15px 0;padding-left:30px}
    main li{margin:5px 0}
    main a{color:#0000ee;text-decoration:none}
    main a:hover{text-decoration:underline}
    .post-list{list-style:none;padding:0}
    .post-list li{margin:20px 0}
    .post-list a{color:#0000ee;text-decoration:none}
    .post-list a:hover{text-decoration:underline}
    main blockquote{margin:22px 0;padding:12px 16px;border-left:4px solid #d0d7de;background:#f6f8fa;color:#57606a}
    main blockquote p{margin:8px 0;color:inherit}
    main blockquote p:first-child{margin-top:0}
    main blockquote p:last-child{margin-bottom:0}
    main img{max-width:100%;height:auto;display:block}
    main figure{margin:24px 0}
    main figure img{max-width:100%;height:auto;display:block}
    main figcaption{margin-top:8px;font-size:14px;line-height:1.5;color:#57606a}
    main .video-embed{position:relative;height:0;overflow:hidden;max-width:100%;margin:24px 0;padding-bottom:56.25%;background:#f6f8fa}
    main .video-embed iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
    main .pdf-embed{margin:24px 0;max-width:100%;background:#525659}
    main .pdf-embed iframe{display:block;width:100%;height:100%;border:0}
    @media (max-width:480px){main .pdf-embed{height:540px!important}}
    main .mermaid{display:block;max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;margin:24px 0;padding:16px;background:#f6f8fa;border-radius:6px;text-align:center}
    main .mermaid svg{max-width:100%;height:auto}
    main iframe{max-width:100%}
    main .callout{margin:22px 0;padding:12px 16px;border:1px solid #e5e5e5;border-left:4px solid #000;background:#f6f8fa}
    main .callout p{margin:8px 0}
    main .callout p:first-child{margin-top:0}
    main .callout p:last-child{margin-bottom:0}
    main .file-card{display:block;margin:22px 0;padding:14px 16px;border:1px solid #e5e5e5;text-decoration:none;background:#fff}
    main .file-card:hover{text-decoration:none;border-color:#0000ee}
    main .file-card-title{font-weight:600}
    main .file-card-desc{margin-top:4px;font-size:14px;line-height:1.5;color:#57606a}
    main hr{border:0;border-top:1px solid #000;margin:40px 0}
    main pre{overflow-x:auto;max-width:100%;background:#f6f8fa;padding:14px 16px;border-radius:6px;font-size:14px;line-height:1.5;margin:20px 0}
    main code,main a{overflow-wrap:anywhere;word-break:break-word}
    main code{font-family:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;font-size:.9em;padding:2px 5px;background:#f6f8fa;border-radius:4px}
    main pre code{padding:0;background:transparent;font-size:inherit;border-radius:0}
    main .footnotes{margin-top:60px;padding-top:20px;border-top:1px solid #e5e5e5;font-size:14px;color:#57606a}
    main .footnotes p{color:inherit;margin:8px 0}
    main .table-wrap{display:block;max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;margin:20px 0}
    main .table-wrap table{margin:0}
    main table{display:block;max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;border-collapse:collapse;margin:20px 0;font-size:15px}
    main th,main td{padding:8px 12px;border:1px solid #e5e5e5;vertical-align:top;text-align:left;line-height:1.5}
    main th{background:#f6f8fa;font-weight:600}
    mjx-container[display="true"]{max-width:100%;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;padding:2px 0}
    @media (max-width:480px){main table{font-size:14px}main th,main td{padding:6px 8px}}
    @media (max-width:480px){.container{padding:40px 16px}.post-title{font-size:30px}main .video-embed{margin:20px 0}main .mermaid{margin:20px 0;padding:12px}}
  </style>

  {% if page.math != false %}
  <!-- MathJax: loaded by default; opt out with `math: false` in front matter -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true,
        processEnvironments: true,
        tags: 'ams'
      },
      svg: {
        fontCache: 'global'
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      },
      startup: {
        pageReady: function () {
          return MathJax.startup.defaultPageReady().then(function () {
            try {
              for (const m of MathJax.startup.document.math) {
                if (m.typesetRoot) {
                  m.typesetRoot.setAttribute('data-tex', m.math);
                  if (m.display) m.typesetRoot.setAttribute('data-display', '');
                }
              }
            } catch (e) { /* non-fatal */ }
          });
        }
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  {% endif %}

  {% if page.mermaid %}
  <!-- Mermaid: opt in with `mermaid: true` in front matter -->
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

    mermaid.initialize({
      startOnLoad: false,
      theme: 'default',
      securityLevel: 'strict'
    });

    window.addEventListener('DOMContentLoaded', async function () {
      const blocks = document.querySelectorAll('pre > code.language-mermaid');

      blocks.forEach(function (code) {
        const pre = code.parentElement;
        if (!pre) return;

        const wrapper = document.createElement('div');
        wrapper.className = 'mermaid';
        wrapper.textContent = code.textContent;

        pre.replaceWith(wrapper);
      });

      if (!blocks.length) return;

      try {
        await mermaid.run({
          querySelector: '.mermaid'
        });
      } catch (err) {
        console.error('Mermaid render failed:', err);
      }
    });
  </script>
  {% endif %}

</head>
<body>
  <div class="container">
    <header>
      <h1><a href="/">{{ site.title }}</a></h1>
    </header>
    <main>
      {{ content }}
    </main>
  </div>
</body>
</html>
