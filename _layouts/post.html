---
layout: default
---
<article>
  <h1 class="post-title">{{ page.title }}</h1>

  <aside id="toc" hidden>
    <details>
      <summary>TOC</summary>
      <nav id="toc-nav" aria-label="Table of contents"></nav>
    </details>
  </aside>

  <div id="post-content">
    {{ content }}
  </div>
</article>

<style>
  #toc {
    margin: 0 0 20px 0;
    font-size: 12px;
    line-height: 1.5;
  }

  #toc details {
    display: block;
  }

  #toc summary {
    cursor: pointer;
    list-style: none;
    color: #0000ee;
    user-select: none;
  }

  #toc summary::-webkit-details-marker {
    display: none;
  }

  #toc nav {
    margin-top: 8px;
  }

  #toc ul {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  #toc li {
    margin: 4px 0;
  }

  #toc li.toc-h3 {
    padding-left: 8px;
  }

  #toc li.toc-h4 {
    padding-left: 16px;
  }

  #toc a {
    color: #0000ee;
    text-decoration: none;
    word-break: break-word;
  }

  #toc a:hover {
    text-decoration: underline;
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/turndown@7.2.0/dist/turndown.min.js" defer></script>
<script>
  // Copy selection as Markdown, reinjecting LaTeX source for any MathJax-rendered formula.
  (function () {
    const article = document.querySelector('article');
    if (!article) return;

    function buildTurndown() {
      if (!window.TurndownService) return null;
      const td = new TurndownService({
        headingStyle: 'atx',
        bulletListMarker: '-',
        codeBlockStyle: 'fenced',
        emDelimiter: '*',
        strongDelimiter: '**',
        hr: '---',
        linkStyle: 'inlined'
      });
      td.addRule('mathjax', {
        filter: function (node) {
          return node.nodeName && node.nodeName.toLowerCase() === 'mjx-container';
        },
        replacement: function (_c, node) {
          const tex = node.getAttribute('data-tex') || '';
          if (!tex) return '';
          const display = node.hasAttribute('data-display') || node.getAttribute('display') === 'true';
          return display ? '\n\n$$' + tex + '$$\n\n' : '$' + tex + '$';
        }
      });
      td.addRule('dropAssistiveMml', {
        filter: ['mjx-assistive-mml'],
        replacement: function () { return ''; }
      });
      return td;
    }

    document.addEventListener('copy', function (e) {
      if (!e.clipboardData) return;
      const sel = window.getSelection && window.getSelection();
      if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return;

      let touches = false;
      for (let i = 0; i < sel.rangeCount; i++) {
        if (sel.getRangeAt(i).intersectsNode(article)) { touches = true; break; }
      }
      if (!touches) return;

      const td = buildTurndown();
      if (!td) return; // Turndown not loaded yet — fall through to native copy.

      const wrapper = document.createElement('div');
      for (let i = 0; i < sel.rangeCount; i++) {
        wrapper.appendChild(sel.getRangeAt(i).cloneContents());
      }

      // If the selection starts mid-list, cloneContents yields bare <li>s;
      // wrap them so Turndown renders list markers.
      const orphanLis = Array.from(wrapper.childNodes).filter(n => n.nodeName === 'LI');
      if (orphanLis.length) {
        const ul = document.createElement('ul');
        orphanLis.forEach(li => ul.appendChild(li));
        wrapper.insertBefore(ul, wrapper.firstChild);
      }

      try {
        const md = td.turndown(wrapper.innerHTML).trim();
        if (!md) return;
        e.clipboardData.setData('text/plain', md);
        e.preventDefault();
      } catch (err) { /* fall back to native */ }
    });
  })();
</script>
<script>
  (function () {
    const content = document.getElementById('post-content');
    const toc = document.getElementById('toc');
    const nav = document.getElementById('toc-nav');
    if (!content || !toc || !nav) return;

    const headings = content.querySelectorAll('h2, h3, h4');
    if (!headings.length) return;

    function slugify(text) {
      return text
        .toLowerCase()
        .trim()
        .replace(/[^\w\u4e00-\u9fff\- ]+/g, '')
        .replace(/\s+/g, '-');
    }

    const ul = document.createElement('ul');

    headings.forEach((h, i) => {
      if (!h.id) {
        h.id = slugify(h.textContent) || `section-${i + 1}`;
      }

      const li = document.createElement('li');
      li.className = `toc-${h.tagName.toLowerCase()}`;

      const a = document.createElement('a');
      a.href = `#${h.id}`;
      a.textContent = h.textContent;
      li.appendChild(a);
      ul.appendChild(li);
    });

    nav.appendChild(ul);
    toc.hidden = false;
  })();
</script>
