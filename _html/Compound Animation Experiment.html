document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<title>Compound — Loading indicators<\u002Ftitle>\n\n<style>\u002F* ==========================================================================\n   Compound — Colors & Type\n   Extracted from compoundlife.ai consolidated CSS + Figma design deliverables.\n   ========================================================================== *\u002F\n\n\u002F* -------------------------------------------------------------------------- *\u002F\n\u002F* Fonts — self-hosted WOFF2 from the production build                        *\u002F\n\u002F* -------------------------------------------------------------------------- *\u002F\n\n@font-face {\n  font-family: \"Aeonik\";\n  src: url(\"fab814fb-890a-42b8-9015-34902f302c54\") format(\"woff2\");\n  font-weight: 300; font-style: normal; font-display: swap;\n}\n@font-face {\n  font-family: \"Aeonik\";\n  src: url(\"6b20383e-1d3e-4e44-9f06-bff6db32a0c7\") format(\"woff2\");\n  font-weight: 400; font-style: normal; font-display: swap;\n}\n@font-face {\n  font-family: \"Aeonik\";\n  src: url(\"2c18dbbf-83d7-4844-a870-345ae4446d6d\") format(\"woff2\");\n  font-weight: 500; font-style: normal; font-display: swap;\n}\n@font-face {\n  font-family: \"Aeonik\";\n  src: url(\"9e2f37d3-7836-483f-a4ef-8739437c2268\") format(\"woff2\");\n  font-weight: 700; font-style: normal; font-display: swap;\n}\n\n@font-face {\n  font-family: \"Neue Haas Unica\";\n  src: url(\"9e7f1e65-0180-4f2a-ae4f-c00b8ce98202\") format(\"woff2\");\n  font-weight: 400; font-style: normal; font-display: swap;\n}\n@font-face {\n  font-family: \"Neue Haas Unica\";\n  src: url(\"4536f137-91ca-48b4-96cc-d83d9feed272\") format(\"woff2\");\n  font-weight: 500; font-style: normal; font-display: swap;\n}\n\n@font-face {\n  font-family: \"PP Neue Montreal\";\n  src: url(\"d35077c4-d0e4-4ad8-970d-cf723b4f2011\") format(\"woff2\");\n  font-weight: 400; font-style: normal; font-display: swap;\n}\n@font-face {\n  font-family: \"PP Neue Montreal\";\n  src: url(\"4f122994-ee8e-46a0-b9e5-ad36870466ad\") format(\"woff2\");\n  font-weight: 500; font-style: normal; font-display: swap;\n}\n\n@font-face {\n  font-family: \"DM Serif Display\";\n  src: url(\"271b9dda-b6a5-4722-9c55-ec46941684c0\") format(\"woff2\");\n  font-weight: 400; font-style: normal; font-display: swap;\n}\n\n\u002F* -------------------------------------------------------------------------- *\u002F\n\u002F* Tokens                                                                     *\u002F\n\u002F* -------------------------------------------------------------------------- *\u002F\n\n:root {\n  \u002F* ---- Font families ---- *\u002F\n  --font-display: \"Aeonik\", \"Neue Haas Unica\", ui-sans-serif, system-ui, sans-serif;\n  --font-body: \"Neue Haas Unica\", \"Aeonik\", ui-sans-serif, system-ui, sans-serif;\n  --font-brand: \"PP Neue Montreal\", \"Aeonik\", ui-sans-serif, system-ui, sans-serif;\n  --font-serif: \"DM Serif Display\", Georgia, serif;\n  --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, \"Liberation Mono\", \"Courier New\", monospace;\n\n  \u002F* ---- Brand primitives (from Figma METADATA + Tailwind tokens) ---- *\u002F\n  --brand-ink: #010116;          \u002F* near-black navy, primary ground *\u002F\n  --brand-ink-soft: #111723;     \u002F* secondary dark ground *\u002F\n  --brand-indigo: #212177;       \u002F* accent \u002F CTA on light ground *\u002F\n  --brand-indigo-hover: #2f2f99;\n  --brand-sky: #adc9f0;          \u002F* secondary \u002F highlight pastel *\u002F\n  --brand-sky-deep: #1d4b7a;     \u002F* deepened sky for headings on light *\u002F\n  --brand-paper: #f7f9fc;        \u002F* surface alt \u002F light ground *\u002F\n  --brand-paper-warm: #eff5f9;\n  --brand-white: #ffffff;\n\n  \u002F* ---- Neutrals (cool grey, Asia-calibrated) ---- *\u002F\n  --n-0:  #ffffff;\n  --n-25: #f8fafd;\n  --n-50: #f4f6f9;\n  --n-75: #eef2f8;\n  --n-100:#e5ebf2;\n  --n-150:#e4e8ef;\n  --n-200:#d7e0ec;\n  --n-300:#bcc4d2;\n  --n-400:#8a8a9a;\n  --n-500:#6c7685;\n  --n-600:#5a6474;\n  --n-700:#3d3d50;\n  --n-800:#1e2530;\n  --n-900:#111723;\n  --n-1000:#010116;\n\n  \u002F* ---- Foreground (semantic) ---- *\u002F\n  --fg-1: #040316;              \u002F* primary text on light ground *\u002F\n  --fg-2: #3d3d50;              \u002F* secondary text *\u002F\n  --fg-3: #5a6474;              \u002F* muted text *\u002F\n  --fg-4: #8a8a9a;              \u002F* tertiary \u002F placeholder *\u002F\n  --fg-inv-1: #ffffff;          \u002F* primary text on dark ground *\u002F\n  --fg-inv-2: rgba(255,255,255,.72);\n  --fg-inv-3: rgba(255,255,255,.48);\n\n  \u002F* ---- Backgrounds (semantic) ---- *\u002F\n  --bg-surface: #ffffff;\n  --bg-surface-alt: #f7f9fc;\n  --bg-surface-warm: #eff5f9;\n  --bg-ground: #f4f5f7;\n  --bg-inverse: #010116;\n  --bg-inverse-alt: #111723;\n\n  \u002F* ---- Data \u002F biomarker status (clinical, muted, Asia palette) ---- *\u002F\n  --data-optimal: #2e6b55;      \u002F* green, desaturated *\u002F\n  --data-optimal-tint: #c2ddd0;\n  --data-normal: #3d3d50;       \u002F* neutral ink *\u002F\n  --data-normal-tint: #e5ebf2;\n  --data-monitor: #b88a44;      \u002F* muted gold *\u002F\n  --data-monitor-tint: #e2d5b8;\n  --data-alert: #a24741;        \u002F* muted rust red *\u002F\n  --data-alert-tint: #dfc2c1;\n  --data-locked: #8a8a9a;\n  --data-uninterpreted: #adc9f0;\n\n  \u002F* ---- Borders \u002F rules ---- *\u002F\n  --border-1: #e5ebf2;          \u002F* hairline on light *\u002F\n  --border-2: #d7e0ec;          \u002F* card divider *\u002F\n  --border-3: #bcc4d2;          \u002F* input rest *\u002F\n  --border-inv-1: rgba(255,255,255,.08);\n  --border-inv-2: rgba(255,255,255,.16);\n\n  \u002F* ---- Radii ---- *\u002F\n  --radius-element: 6px;        \u002F* chips, small buttons *\u002F\n  --radius-md: 10px;\n  --radius-card: 16px;          \u002F* default card *\u002F\n  --radius-lg: 20px;\n  --radius-hero: 24px;          \u002F* hero \u002F large media *\u002F\n  --radius-2xl: 32px;\n  --radius-pill: 9999px;        \u002F* CTA pill (brand signature) *\u002F\n\n  \u002F* ---- Shadows (restrained — brand is low-shadow) ---- *\u002F\n  --shadow-flat: 0 0 0 1px rgba(0,0,0,.06);\n  --shadow-hover: 0 2px 8px rgba(0,0,0,.06), 0 0 1px rgba(0,0,0,.04);\n  --shadow-card: 0 1px 2px rgba(0,0,0,.05), 0 1px 3px rgba(0,0,0,.04);\n  --shadow-float: 0 20px 60px -16px rgba(0,0,0,.30);\n  --shadow-float-glow: 0 20px 60px -16px rgba(0,0,0,.18), 0 0 40px rgba(33,33,119,.18);\n  --shadow-inset-top: inset 0 1px 0 0 rgba(255,255,255,.12);\n\n  \u002F* ---- Spacing (Tailwind .25rem base) ---- *\u002F\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-8: 32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n  --space-24: 96px;\n\n  \u002F* ---- Type scale ---- *\u002F\n  --text-xs: 12px;\n  --text-sm: 14px;\n  --text-base: 16px;\n  --text-md: 18px;\n  --text-lg: 20px;\n  --text-xl: 24px;\n  --text-2xl: 30px;\n  --text-3xl: 38px;\n  --text-4xl: 48px;\n  --text-5xl: 64px;\n  --text-display: 96px;\n\n  \u002F* ---- Motion ---- *\u002F\n  --ease-out: cubic-bezier(0, 0, .2, 1);\n  --ease-std: cubic-bezier(.4, 0, .2, 1);\n  --dur-1: .15s;\n  --dur-2: .25s;\n  --dur-3: .4s;\n\n  \u002F* ---- Layout ---- *\u002F\n  --container-max: 1280px;\n  --container-reading: 760px;\n  --nav-height: 68px;\n}\n\n\u002F* -------------------------------------------------------------------------- *\u002F\n\u002F* Semantic base classes                                                      *\u002F\n\u002F* -------------------------------------------------------------------------- *\u002F\n\n.c-display-1 {\n  font-family: var(--font-display);\n  font-weight: 500;\n  font-size: clamp(40px, 6vw, 72px);\n  line-height: 1.02;\n  letter-spacing: -0.03em;\n  color: var(--fg-1);\n}\n.c-display-2 {\n  font-family: var(--font-display);\n  font-weight: 500;\n  font-size: clamp(32px, 4.4vw, 56px);\n  line-height: 1.05;\n  letter-spacing: -0.028em;\n  color: var(--fg-1);\n}\n.c-h1 {\n  font-family: var(--font-display);\n  font-weight: 500;\n  font-size: clamp(28px, 3.4vw, 44px);\n  line-height: 1.08;\n  letter-spacing: -0.02em;\n  color: var(--fg-1);\n}\n.c-h2 {\n  font-family: var(--font-display);\n  font-weight: 500;\n  font-size: clamp(24px, 2.6vw, 34px);\n  line-height: 1.15;\n  letter-spacing: -0.015em;\n  color: var(--fg-1);\n}\n.c-h3 {\n  font-family: var(--font-display);\n  font-weight: 500;\n  font-size: 22px;\n  line-height: 1.25;\n  letter-spacing: -0.01em;\n  color: var(--fg-1);\n}\n.c-lead {\n  font-family: var(--font-body);\n  font-weight: 400;\n  font-size: 20px;\n  line-height: 1.5;\n  color: var(--fg-2);\n}\n.c-body {\n  font-family: var(--font-body);\n  font-weight: 400;\n  font-size: 16px;\n  line-height: 1.6;\n  color: var(--fg-2);\n}\n.c-small {\n  font-family: var(--font-body);\n  font-weight: 400;\n  font-size: 14px;\n  line-height: 1.5;\n  color: var(--fg-3);\n}\n.c-micro {\n  font-family: var(--font-body);\n  font-weight: 400;\n  font-size: 12px;\n  line-height: 1.4;\n  color: var(--fg-3);\n}\n.c-kicker {\n  \u002F* Tracked-out small caps — \"YOUR JOURNEY BEGINS\", \"COMPOUND MEMBERSHIP\" *\u002F\n  font-family: var(--font-body);\n  font-weight: 500;\n  font-size: 12px;\n  line-height: 1;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--fg-3);\n}\n.c-step {\n  \u002F* Zero-padded mono step labels — \"01 — Deep Phenotyping\" *\u002F\n  font-family: var(--font-mono);\n  font-weight: 500;\n  font-size: 13px;\n  line-height: 1;\n  letter-spacing: 0.04em;\n  color: var(--fg-4);\n}\n.c-editorial {\n  font-family: var(--font-serif);\n  font-weight: 400;\n  font-size: clamp(32px, 4vw, 52px);\n  line-height: 1.1;\n  letter-spacing: -0.01em;\n  color: var(--fg-1);\n}\n.c-numeric {\n  \u002F* Biomarker values, health score, biological age *\u002F\n  font-family: var(--font-disp 002FanimateMotion>\n      <\u002Fcircle>\n    <\u002Fg>\n  <\u002Fsvg>\n<\u002Ftemplate>\n\n<!-- 44 · Split — a pair splits into three lobes, then reforms -->\n<template id=\"t44\">\n  <svg viewBox=\"0 0 200 200\" width=\"200\" height=\"200\">\n    <g filter=\"url(#goo)\">\n      <circle cy=\"100\" r=\"20\" fill=\"var(--l-indigo)\">\n        <animate attributeName=\"cx\" values=\"100;60;100;100\" dur=\"3s\" repeatCount=\"indefinite\"><\u002Fanimate>\n        <animate attributeName=\"cy\" values=\"100;80;100;100\" dur=\"3s\" repeatCount=\"indefinite\"><\u002Fanimate>\n      <\u002Fcircle>\n      <circle cy=\"100\" r=\"20\" fill=\"var(--l-indigo)\">\n        <animate attributeName=\"cx\" values=\"100;140;100;100\" dur=\"3s\" repeatCount=\"indefinite\"><\u002Fanimate>\n        <animate attributeName=\"cy\" values=\"100;80;100;100\" dur=\"3s\" repeatCount=\"indefinite\"><\u002Fanimate>\n      <\u002Fcircle>\n      <circle cx=\"100\" r=\"20\" fill=\"var(--l-indigo)\">\n        <animate attributeName=\"cy\" values=\"100;140;100;100\" dur=\"3s\" repeatCount=\"indefinite\"><\u002Fanimate>\n      <\u002Fcircle>\n    <\u002Fg>\n  <\u002Fsvg>\n<\u002Ftemplate>\n\n<!-- 45 · Hue — bonded pair cycles the brand palette -->\n<template id=\"t45\">\n  <svg viewBox=\"0 0 200 200\" width=\"200\" height=\"200\">\n    <g filter=\"url(#goo)\">\n      <circle cx=\"100\" cy=\"70\" r=\"22\">\n        <animate attributeName=\"fill\" values=\"#212177;#1d4b7a;#adc9f0;#212177\" dur=\"6s\" repeatCount=\"indefinite\"><\u002Fanimate>\n        <animate attributeName=\"r\" values=\"18;26;18\" dur=\"2.4s\" repeatCount=\"indefinite\"><\u002Fanimate>\n      <\u002Fcircle>\n      <rect x=\"94\" y=\"78\" width=\"12\" height=\"44\" rx=\"6\">\n        <animate attributeName=\"fill\" values=\"#212177;#1d4b7a;#adc9f0;#212177\" dur=\"6s\" repeatCount=\"indefinite\"><\u002Fanimate>\n      <\u002Frect>\n      <circle cx=\"100\" cy=\"130\" r=\"22\">\n        <animate attributeName=\"fill\" values=\"#adc9f0;#212177;#1d4b7a;#adc9f0\" dur=\"6s\" repeatCount=\"indefinite\"><\u002Fanimate>\n        <animate attributeName=\"r\" values=\"26;18;26\" dur=\"2.4s\" repeatCount=\"indefinite\"><\u002Fanimate>\n      <\u002Fcircle>\n    <\u002Fg>\n  <\u002Fsvg>\n<\u002Ftemplate>\n\n<!-- 46 · Pendulum — the mark hangs from an ink pivot and swings -->\n<template id=\"t46\">\n  <svg viewBox=\"0 0 200 200\" width=\"200\" height=\"200\">\n    <g filter=\"url(#goo)\">\n      <g style=\"transform-origin: 100px 30px; animation: l46-swing 2s ease-in-out infinite alternate\">\n        <rect x=\"96\" y=\"30\" width=\"8\" height=\"56\" rx=\"4\" fill=\"var(--l-indigo)\" opacity=\".35\"><\u002Frect>\n        <circle cx=\"100\" cy=\"90\" r=\"18\" fill=\"var(--l-indigo)\"><\u002Fcircle>\n        <rect x=\"96\" y=\"98\" width=\"8\" height=\"32\" rx=\"4\" fill=\"var(--l-indigo)\"><\u002Frect>\n        <circle cx=\"100\" cy=\"140\" r=\"22\" fill=\"var(--l-indigo)\"><\u002Fcircle>\n      <\u002Fg>\n      <circle cx=\"100\" cy=\"30\" r=\"5\" fill=\"var(--l-ink)\"><\u002Fcircle>\n    <\u002Fg>\n  <\u002Fsvg>\n  <style>@keyframes l46-swing { 0%{transform:rotate(-22deg);} 100%{transform:rotate(22deg);} }<\u002Fstyle>\n<\u002Ftemplate>\n\n<script>\n(() => {\n  \u002F\u002F Two-tone tile backgrounds only: paper \u002F warm\n  \u002F\u002F Interleaved by visual density — dense (D) \u002F medium (M) \u002F sparse (S) alternate\n  \u002F\u002F so no stretch of the grid feels too heavy or too empty.\n  const CELLS = [\n    { id:'l01', name:'Bond',          theme:'paper', ref:'t01' }, \u002F\u002F M\n    { id:'l33', name:'Lattice',       theme:'warm',  ref:'t33' }, \u002F\u002F D\n    { id:'l06', name:'Drift',         theme:'paper', ref:'t06' }, \u002F\u002F S\n    { id:'l14', name:'Trio Chase',    theme:'warm',  ref:'t14' }, \u002F\u002F D\n    { id:'l03', name:'Drip',          theme:'paper', ref:'t03' }, \u002F\u002F M\n    { id:'l13', name:'Trio Breath',   theme:'warm',  ref:'t13' }, \u002F\u002F S\n    { id:'l23', name:'Petal Wave',    theme:'paper', ref:'t23' }, \u002F\u002F D\n    { id:'l05', name:'Shuttle',       theme:'warm',  ref:'t05' }, \u002F\u002F M\n    { id:'l28', name:'Loose Orbit',   theme:'paper', ref:'t28' }, \u002F\u002F S\n    { id:'l12', name:'Trispin',       theme:'warm',  ref:'t12' }, \u002F\u002F D\n    { id:'l32', name:'Fold',          theme:'paper', ref:'t32' }, \u002F\u002F M\n    { id:'l07', name:'Echo',          theme:'warm',  ref:'t07' }, \u002F\u002F S\n    { id:'l30', name:'Stacked',       theme:'paper', ref:'t30' }, \u002F\u002F D\n    { id:'l10', name:'Pour',          theme:'warm',  ref:'t10' }, \u002F\u002F M\n    { id:'l25', name:'Limp',          theme:'paper', ref:'t25' }, \u002F\u002F S\n    { id:'l24', name:'Scatter',       theme:'warm',  ref:'t24' }, \u002F\u002F D\n    { id:'l46', name:'Pendulum',      theme:'paper', ref:'t46' }, \u002F\u002F M\n    { id:'l02', name:'Orbit',         theme:'warm',  ref:'t02' }, \u002F\u002F S\n    { id:'l09', name:'Cross',         theme:'paper', ref:'t09' }, \u002F\u002F D\n    { id:'l04', name:'Fill',          theme:'warm',  ref:'t04' }, \u002F\u002F M\n    { id:'l34', name:'Merge',         theme:'paper', ref:'t34' }, \u002F\u002F S\n    { id:'l22', name:'Tri Wobble',    theme:'warm',  ref:'t22' }, \u002F\u002F D\n    { id:'l26', name:'Jolt',          theme:'paper', ref:'t26' }, \u002F\u002F M\n    { id:'l29', name:'Wander',        theme:'warm',  ref:'t29' }, \u002F\u002F S\n    { id:'l17', name:'Hex Ring',      theme:'paper', ref:'t17' }, \u002F\u002F D\n    { id:'l45', name:'Hue',           theme:'warm',  ref:'t45' }, \u002F\u002F M\n    { id:'l40', name:'Blossom',       theme:'paper', ref:'t40' }, \u002F\u002F M\n    { id:'l18', name:'Triple Orbit',  theme:'warm',  ref:'t18' }, \u002F\u002F D\n    { id:'l20', name:'Stagger',       theme:'paper', ref:'t20' }, \u002F\u002F M\n    { id:'l27', name:'Wild Dash',     theme:'warm',  ref:'t27' }, \u002F\u002F M\n    { id:'l15', name:'Skitter',       theme:'paper', ref:'t15' }, \u002F\u002F D\n    { id:'l37', name:'Swap',          theme:'warm',  ref:'t37' }, \u002F\u002F M\n    { id:'l21', name:'Triple Drip',   theme:'paper', ref:'t21' }, \u002F\u002F M\n    { id:'l41', name:'Pass',          theme:'warm',  ref:'t41' }, \u002F\u002F D\n    { id:'l43', name:'Outline',       theme:'paper', ref:'t43' }, \u002F\u002F M\n    { id:'l08', name:'Infinity',      theme:'warm',  ref:'t08' }, \u002F\u002F M\n    { id:'l11', name:'Trimark',       theme:'paper', ref:'t11' }, \u002F\u002F D\n    { id:'l44', name:'Split',         theme:'warm',  ref:'t44' }, \u002F\u002F M\n    { id:'l36', name:'Nudge',         theme:'paper', ref:'t36' }, \u002F\u002F M\n    { id:'l38', name:'Scan',          theme:'warm',  ref:'t38' }, \u002F\u002F D\n    { id:'l16', name:'Converge',      theme:'paper', ref:'t16' }, \u002F\u002F M\n    { id:'l35', name:'Pair Rain',     theme:'warm',  ref:'t35' }, \u002F\u002F M\n    { id:'l42', name:'Chain',         theme:'paper', ref:'t42' }, \u002F\u002F D\n    { id:'l39', name:'Magnet',        theme:'warm',  ref:'t39' }, \u002F\u002F M\n    { id:'l31', name:'Glitch Sweep',  theme:'paper', ref:'t31' }, \u002F\u002F M\n    { id:'l19', name:'Breathing Mark',theme:'warm',  ref:'t19' }, \u002F\u002F D\n  ];\n\n  const grid = document.getElementById('grid');\n  CELLS.forEach((c, i) => {\n    const cell = document.createElement('div');\n    cell.className = `cell ${c.theme} ${c.id}`;\n    const idx = document.createElement('span');\n    idx.className = 'idx';\n    idx.textContent = String(i + 1).padStart(2, '0');\n    cell.appendChild(idx);\n    const box = document.createElement('div');\n    box.className = 'box';\n    const tpl = document.getElementById(c.ref);\n    box.appendChild(tpl.content.cloneNode(true));\n    cell.appendChild(box);\n    const name = document.createElement('span');\n    name.className = 'name';\n    name.textContent = c.name;\n    cell.appendChild(name);\n    grid.appendChild(cell);\n  });\n\n  \u002F\u002F --- 17 · Hex ring (6 nodes) breathing in wave ---\n  {\n    const g = document.querySelector('.l17 #hex17');\n    if (g) {\n      const N = 6, cx = 100, cy = 100, R = 56;\n      for (let i = 0; i < N; i++) {\n        const a = (i \u002F N) * Math.PI * 2 - Math.PI \u002F 2;\n        const x = cx + Math.cos(a) * R;\n        const y = cy + Math.sin(a) * R;\n        const delay = ((i \u002F N) * 1.6 - 1.6).toFixed(2);\n        g.insertAdjacentHTML('beforeend',\n          `<circle cx=\"${x.toFixed(1)}\" cy=\"${y.toFixed(1)}\" r=\"9\" fill=\"var(--l-indigo)\">\n             <animate attributeName=\"r\" values=\"6;14;6\" dur=\"1.6s\" begin=\"${delay}s\" repeatCount=\"indefinite\"\u002F>\n           <\u002Fcircle>`);\n      }\n      g.insertAdjacentHTML('beforeend',\n        `<circle cx=\"100\" cy=\"100\" r=\"8\" fill=\"var(--l-indigo)\"\u002F>`);\n    }\n  }\n\n  \u002F\u002F --- 23 · Petal wave: 6 radial bonded-pairs, ring-wave of scale ---\n  {\n    const g = document.querySelector('.l23 #petal23');\n    if (g) {\n      const N = 6, cx = 100, cy = 100;\n      for (let i = 0; i < N; i++) {\n        const deg = (i \u002F N) * 360;\n        const delay = ((i \u002F N) * 2.0 - 2.0).toFixed(2);\n        g.insertAdjacentHTML('beforeend',\n          `<g transform=\"rotate(${deg} ${cx} ${cy})\">\n             <circle cx=\"100\" cy=\"52\" r=\"8\" fill=\"var(--l-indigo)\"\u002F>\n             <rect x=\"96\" y=\"60\" width=\"8\" height=\"18\" rx=\"4\" fill=\"var(--l-indigo)\"\u002F>\n             <circle cx=\"100\" cy=\"86\" r=\"10\" fill=\"var(--l-indigo)\">\n               <animate attributeName=\"r\" values=\"6;14;6\" dur=\"2s\" begin=\"${delay}s\" repeatCount=\"indefinite\"\u002F>\n             <\u002Fcircle>\n           <\u002Fg>`);\n      }\n    }\n  }\n\n  \u002F\u002F --- 33 · Hex lattice: 1 center + 6 ring, wave of scale radiating out ---\n  {\n    const g = document.querySelector('.l33 #lat33');\n    if (g) {\n      const cx = 100, cy = 100, R = 42;\n      g.insertAdjacentHTML('beforeend',\n        `<circle cx=\"${cx}\" cy=\"${cy}\" r=\"12\" fill=\"var(--l-indigo)\">\n           <animate attributeName=\"r\" values=\"10;16;10\" dur=\"1.8s\" repeatCount=\"indefinite\"\u002F>\n         <\u002Fcircle>`);\n      for (let i = 0; i < 6; i++) {\n        const a = (i \u002F 6) * Math.PI * 2 - Math.PI \u002F 2;\n        const x = cx + Math.cos(a) * R;\n        const y = cy + Math.sin(a) * R;\n        g.insertAdjacentHTML('beforeend',\n          `<circle cx=\"${x.toFixed(1)}\" cy=\"${y.toFixed(1)}\" r=\"10\" fill=\"var(--l-indigo)\">\n             <animate attributeName=\"r\" values=\"8;14;8\" dur=\"1.8s\" begin=\"-1.2s\" repeatCount=\"indefinite\"\u002F>\n           <\u002Fcircle>`);\n      }\n      for (let i = 0; i < 6; i++) {\n        const a = (i \u002F 6) * Math.PI * 2 - Math.PI \u002F 2 + Math.PI \u002F 6;\n        const x = cx + Math.cos(a) * (R * 1.7);\n        const y = cy + Math.sin(a) * (R * 1.7);\n        g.insertAdjacentHTML('beforeend',\n          `<circle cx=\"${x.toFixed(1)}\" cy=\"${y.toFixed(1)}\" r=\"8\" fill=\"var(--l-indigo)\">\n             <animate attributeName=\"r\" values=\"6;12;6\" dur=\"1.8s\" begin=\"-0.6s\" repeatCount=\"indefinite\"\u002F>\n           <\u002Fcircle>`);\n      }\n    }\n  }\n\n  \u002F\u002F Pause loaders that aren't on screen. SVG filter(#goo) chains are\n  \u002F\u002F GPU-expensive on mobile; ticking 45 of them at once tanks framerate.\n  const cells = document.querySelectorAll('.cell');\n  const pause = (cell) => {\n    cell.classList.add('is-paused');\n    cell.querySelectorAll('svg').forEach(s => { try { s.pauseAnimations(); } catch (_) {} });\n  };\n  const resume = (cell) => {\n    cell.classList.remove('is-paused');\n    cell.querySelectorAll('svg').forEach(s => { try { s.unpauseAnimations(); } catch (_) {} });\n  };\n  if ('IntersectionObserver' in window) {\n    cells.forEach(pause);\n    const io = new IntersectionObserver((entries) => {\n      for (const e of entries) {\n        if (e.isIntersecting) resume(e.target); else pause(e.target);\n      }\n    }, { rootMargin: '200px 0px' });\n    cells.forEach(c => io.observe(c));\n  }\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
