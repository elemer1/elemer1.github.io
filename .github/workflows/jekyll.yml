name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUNDLE_FORCE_RUBY_PLATFORM: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Run content checks
        run: node scripts/check.mjs
        env:
          ELEMER_REPO_VISIBILITY: ${{ github.event.repository.visibility }}
      - name: Detect encrypted articles
        id: encrypted
        run: node scripts/has-encrypted.mjs
      - name: Cache external images
        uses: actions/cache@v4
        with:
          path: assets/images
          key: external-images-${{ hashFiles('scripts/fetch-images.sh') }}
      - name: Fetch external images
        run: ./scripts/fetch-images.sh
      - name: Build with Jekyll
        if: steps.encrypted.outputs.encrypted != 'true'
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
      - name: Build with Jekyll (plaintext pass for encryptor)
        if: steps.encrypted.outputs.encrypted == 'true'
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
      - name: Encrypt password-locked articles
        if: steps.encrypted.outputs.encrypted == 'true'
        run: node scripts/encrypt.mjs
      - name: Build with Jekyll (final pass with encrypted pages)
        if: steps.encrypted.outputs.encrypted == 'true'
        run: |
          rm -rf _site
          bundle exec jekyll build
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
